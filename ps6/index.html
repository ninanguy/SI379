<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lemon Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <main class="idle">
        <h1>Lemon Timer</h1>

        <!-- add task section -->
        <div class="task-controls">
            <button id="add-task">+ Add Task</button>
            <div id="task-input-container" class="hidden">
                <input type="text" id="task-input" placeholder="Enter task description">
                <button id="confirm-add-task">Add</button>
            </div>
        </div>

        <!-- interval settings -->
        <div class="interval-settings">
            <label>Work interval (minutes):
                <input type="number" id="work-interval" value="25" min="1" step="0.5">
            </label>
            <label>Break interval (minutes):
                <input type="number" id="break-interval" value="5" min="1" step="0.5">
            </label>
        </div>

        <!-- task list -->
        <ul id="task-list"></ul>

        <!-- timer display -->
        <div id="timer" class="hidden">
            <h2 id="current-task-name"></h2>
            <div id="countdown">00:00</div>
            <button id="stop-timer">Stop</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
